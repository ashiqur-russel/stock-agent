# Run on every PR targeting main and on pushes to main.
# Merging should be blocked until this workflow passes (GitHub: branch protection → require status checks).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend - Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff
      - name: Ruff check
        run: ruff check backend
      - name: Ruff format
        run: ruff format --check backend

  backend-unit-tests:
    name: Backend - Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Pytest
        run: python -m pytest
        working-directory: backend
        env:
          GROQ_API_KEY: "ci-mock"
          JWT_SECRET: "ci-mock"

  frontend-lint:
    name: Frontend - Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: ESLint
        run: npm run lint
        working-directory: frontend

  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install app deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
      - name: Import smoke test
        run: python -c "from main import app; assert app.title == 'Stock Agent API'"
        working-directory: backend
        env:
          GROQ_API_KEY: "ci-mock"
          JWT_SECRET: "ci-mock"

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Next.js build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"

  docker:
    name: Docker - Build images
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: stock-agent-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          tags: stock-agent-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
