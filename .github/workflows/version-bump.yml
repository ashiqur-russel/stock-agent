# After each push to main, bump patch version and sync VERSION ↔ backend ↔ frontend.
# The bump commit message contains [automated version bump] so this workflow does not loop.
name: Version bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[automated version bump]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Bump patch version
        run: python scripts/bump_version.py
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION backend/VERSION frontend/package.json frontend/package-lock.json
          if git diff --staged --quiet; then
            echo "No version changes"
            exit 0
          fi
          git commit -m "chore: [automated version bump] sync VERSION and frontend package"
          git push
