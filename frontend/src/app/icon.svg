<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Baseline -->
  <line x1="4" y1="27" x2="28" y2="27" stroke="#1e293b" stroke-width="1"/>

  <!-- Rising chart bars -->
  <rect x="4"  y="20" width="4" height="7" rx="1" fill="#166534" opacity="0.6"/>
  <rect x="10" y="15" width="4" height="12" rx="1" fill="#16a34a" opacity="0.7"/>
  <rect x="16" y="10" width="4" height="17" rx="1" fill="#22c55e" opacity="0.85"/>
  <rect x="22" y="5"  width="4" height="22" rx="1" fill="#22c55e"/>

  <!-- Trend line overlay -->
  <polyline
    points="6,21 12,16 18,11 24,6"
    stroke="#4ade80"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.7"
  />

  <!-- Signal dot at peak (AI signal) -->
  <circle cx="24" cy="6" r="2.5" fill="#4ade80"/>
  <circle cx="24" cy="6" r="4.5" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.25"/>
</svg>
