# Install: pip install -r dev-requirements.txt
#          pre-commit install
#
# This registers three Git hook types: pre-commit, commit-msg, pre-push.
# Subject line rule: the first line must be  [SA-<number>] <type>: <summary>
# (Merge / Revert / fixup! / squash!  are exempt).
#
# Branch names (on commit): gh-pages (rare), or
#   feature/SA-<n>-slug, fix/SA-<n>-…, hotfix/SA-<n>, chore/SA-<n>, etc.
# Commits on main/master/development/develop: rejected — use a topic branch; PR base = development.
# Same SA-<n> must not be used on two different branches in this clone (use a new
# id or delete the other ref after merge; hook only sees local + fetched remotes).
# Prefer GitHub issue # as n; else use lowest unused SA-n or max(n)+1 — not random
# high ids (see CONTRIBUTING.md → Branches and commit messages).
# pre-push: blocks `git push` to remote main/master/development/develop; also runs [SA-n] on pushes.
#
# Enforce on GitHub: branch protection — no direct push to main or development.
# Bypass (emergency): `git push --no-verify` or `ALLOW_PUSH_PROTECTED=1 git push` (legacy: ALLOW_PUSH_TO_MAIN=1).
#
# Skip on commit:  SKIP=sa-commit-msg,branch-name git commit
# Skip a hook:     SKIP=sa-pre-push-commits,block-push-to-main git push

default_install_hook_types: [pre-commit, commit-msg, pre-push]
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^frontend/node_modules/
      - id: end-of-file-fixer
        exclude: ^(frontend/node_modules/|\.next/)
      - id: trailing-whitespace
        exclude: ^(frontend/node_modules/|\.next/)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/.*\.py$
      - id: ruff-format
        files: ^backend/.*\.py$

  - repo: local
    hooks:
      - id: branch-name
        name: "branch: feature/SA-…, fix/SA-… (no main; ticket after prefix)"
        entry: python3 scripts/verify_branch_name.py
        language: system
        pass_filenames: false
        always_run: true

      - id: sa-commit-msg
        name: "[SA-n] commit subject (first line)"
        entry: python3 scripts/sa_commit_message.py
        language: system
        stages: [commit-msg]

      - id: block-push-to-main
        name: block direct push to protected branches (main, development, …)
        entry: python3 scripts/pre_push_block_main.py
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

      - id: sa-pre-push-commits
        name: "[SA-n] on all commits in push"
        entry: python3 scripts/sa_commit_message.py
        language: system
        args: [--pre-push]
        pass_filenames: false
        stages: [pre-push]
        always_run: true
