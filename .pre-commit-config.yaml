# Install: pip install -r dev-requirements.txt
#          pre-commit install
#
# This registers three Git hook types: pre-commit, commit-msg, pre-push.
# Subject line rule: the first line must be  [SA-<number>] <type>: <summary>
# (Merge / Revert / fixup! / squash!  are exempt).
#
# Branch names (enforced on commit): main/master/develop, or
#   feature/*, fix/*, hotfix/*, chore/*, docs/*, release/*
# pre-push: also blocks `git push` to remote main/master (use topic branch + PR).
# Also runs [SA-n] on pushed commits. Bypass push hook: `git push --no-verify` or
#   ALLOW_PUSH_TO_MAIN=1 git push  (emergency only)
# Skip on commit:  SKIP=sa-commit-msg,branch-name git commit
# Skip a hook:      SKIP=sa-pre-push-commits,block-push-to-main git push

default_install_hook_types: [pre-commit, commit-msg, pre-push]
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^frontend/node_modules/
      - id: end-of-file-fixer
        exclude: ^(frontend/node_modules/|\.next/)
      - id: trailing-whitespace
        exclude: ^(frontend/node_modules/|\.next/)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/.*\.py$
      - id: ruff-format
        files: ^backend/.*\.py$

  - repo: local
    hooks:
      - id: branch-name
        name: branch name (feature/*, fix/*, hotfix/*, …)
        entry: python3 scripts/verify_branch_name.py
        language: system
        pass_filenames: false
        always_run: true

      - id: sa-commit-msg
        name: "[SA-n] commit subject (first line)"
        entry: python3 scripts/sa_commit_message.py
        language: system
        stages: [commit-msg]

      - id: block-push-to-main
        name: block direct push to main/master
        entry: python3 scripts/pre_push_block_main.py
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

      - id: sa-pre-push-commits
        name: "[SA-n] on all commits in push"
        entry: python3 scripts/sa_commit_message.py
        language: system
        args: [--pre-push]
        pass_filenames: false
        stages: [pre-push]
        always_run: true
